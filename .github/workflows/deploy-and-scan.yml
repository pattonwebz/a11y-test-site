name: Deploy and scan

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/
      - id: deployment
        uses: actions/deploy-pages@v4

  accessibility:
    name: Accessibility scan of the live site
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Build URL list from the deployed base URL
        run: |
          base="${{ needs.deploy.outputs.page_url }}"
          printf '%s\n' \
            "$base" \
            "${base}about.html" \
            "${base}menu.html" \
            "${base}gallery.html" \
            "${base}events.html" \
            "${base}contact.html" \
            "${base}clean.html" > urls.txt
          cat urls.txt

      - name: Scan with axe-core
        id: scan
        uses: pattonwebz/axe-scan-action@v0.0.3
        with:
          urls-file: urls.txt

      - name: Report and enforce threshold
        if: always()
        uses: pattonwebz/axe-report-action@v0.0.3
        with:
          results-file: ${{ steps.scan.outputs.results-file }}
          fail-on: serious
          show-personas: true

      - name: Render HTML report
        if: always()
        id: html
        uses: pattonwebz/axe-html-report-action@v0.0.2
        with:
          results-file: ${{ steps.scan.outputs.results-file }}
          output-file: axe-report.html
          title: Demo Bakery accessibility report

      - name: Upload raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-results
          path: ${{ steps.scan.outputs.results-file }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: ${{ steps.html.outputs.report-file }}
