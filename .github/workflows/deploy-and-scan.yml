name: Deploy and scan

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/
      - id: deployment
        uses: actions/deploy-pages@v4

  accessibility:
    name: Accessibility scan of the live site
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Build URL list from the deployed base URL
        run: |
          base="${{ needs.deploy.outputs.page_url }}"
          printf '%s\n' \
            "$base" \
            "${base}about.html" \
            "${base}clean.html" > urls.txt
          cat urls.txt

      - name: Scan with axe-core
        id: scan
        uses: pattonwebz/axe-scan-action@v0.0.3
        with:
          urls-file: urls.txt

      - name: Report and enforce threshold
        if: always()
        uses: pattonwebz/axe-report-action@v0.0.2
        with:
          results-file: ${{ steps.scan.outputs.results-file }}
          fail-on: serious

      - name: Upload raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-results
          path: ${{ steps.scan.outputs.results-file }}

  custom-rules:
    name: Custom ruleset scan of the live site
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Load EDAC custom ruleset
        id: ruleset
        uses: pattonwebz/accessibility-checker-rules/.github/actions/ruleset@main

      - name: Scan with custom rules
        id: scan
        uses: pattonwebz/axe-scan-action@main
        with:
          urls: '["${{ needs.deploy.outputs.page_url }}", "${{ needs.deploy.outputs.page_url }}about.html", "${{ needs.deploy.outputs.page_url }}clean.html"]'
          configure-file: ${{ steps.ruleset.outputs.configure-file }}
          rules: ${{ steps.ruleset.outputs.rules }}
          output-file: custom-rules-results.json

      - name: Render HTML report
        if: always()
        id: html
        uses: pattonwebz/axe-html-report-action@main
        with:
          results-file: ${{ steps.scan.outputs.results-file }}
          output-file: custom-rules-report.html
          title: a11y-test-site — custom ruleset scan

      - name: Upload custom-rules results + report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: custom-rules-scan
          path: |
            custom-rules-results.json
            custom-rules-report.html
